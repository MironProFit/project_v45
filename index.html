<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ну а чего ты хотел</title>
    <meta
      property="og:image"
      content="./3a4968de-74fc-4e62-93c8-297be9bf0b22.jpg"
    />
    <meta property="og:image:width" content="1" />
    <meta property="og:image:height" content="1" />
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f0f0;
        font-family: Arial, sans-serif;
      }

      #showImageBtn {
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        transition: background-color 0.3s;
      }

      #showImageBtn:hover {
        background-color: #0056b3;
      }

      #fullscreenOverlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }

      #fullscreenImage {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      }

      #closeBtn {
        position: absolute;
        top: 20px;
        right: 30px;
        color: white;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
        user-select: none;
      }

      #closeBtn:hover {
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <img src="./3a4968de-74fc-4e62-93c8-297be9bf0b22.jpg" alt="">
    <button id="showImageBtn">Нажмите для продолжения</button>

    <div id="fullscreenOverlay">
      <span id="closeBtn">&times;</span>
      <img id="fullscreenImage" src="./3d4c0704a83c7fd091224cc22295655e.jpg" alt="Full Screen Image">
      <!-- <img id="fullscreenImage" src="./картинка.htm" alt="Full Screen Image" /> -->
    </div>

    <script>
      const btn = document.getElementById('showImageBtn')
      const overlay = document.getElementById('fullscreenOverlay')
      const closeBtn = document.getElementById('closeBtn')

      btn.addEventListener('click', () => {
        overlay.style.display = 'flex'
      })

      closeBtn.addEventListener('click', () => {
        overlay.style.display = 'none'
      })

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          overlay.style.display = 'none'
        }
      })
    </script>
  </body>
</html>
